<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Deal Analyzer</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.app {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 25px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

.results {
  margin-top: 20px;
  padding: 15px;
  background: rgba(0,0,0,0.3);
  border-radius: 10px;
}

.good { color: #22c55e; }
.warn { color: #facc15; }
.bad { color: #ef4444; }

.metric {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

.cta {
  margin-top: 20px;
  padding: 12px;
  background: #22c55e;
  color: black;
  text-align: center;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="app">
<h1>🏠 Elite Deal Analyzer</h1>

<input type="number" id="payment" placeholder="Monthly Payment" oninput="analyze()">
<input type="number" id="rent" placeholder="Rent Estimate" oninput="analyze()">
<input type="number" id="balance" placeholder="Mortgage Balance" oninput="analyze()">
<input type="number" id="arv" placeholder="ARV" oninput="analyze()">

<div class="results" id="output">
Enter numbers to analyze deal...
</div>

<div class="cta" onclick="alert('Upgrade system coming soon')">
🚀 Get Full Investor System
</div>

</div>

<script>
function analyze() {
  let payment = parseFloat(document.getElementById('payment').value) || 0;
  let rent = parseFloat(document.getElementById('rent').value) || 0;
  let balance = parseFloat(document.getElementById('balance').value) || 0;
  let arv = parseFloat(document.getElementById('arv').value) || 0;

  let cashFlow = rent - payment;
  let equity = arv - balance;
  let annual = cashFlow * 12;

  let rating = "";
  let strategy = "";
  let color = "";

  if (cashFlow >= 500 && equity >= 30000) {
    rating = "🔥 GREAT DEAL";
    strategy = "Move FAST or Hold";
    color = "good";
  } else if (cashFlow >= 200 && equity >= 15000) {
    rating = "✅ GOOD DEAL";
    strategy = "Strong Opportunity";
    color = "good";
  } else if (cashFlow >= 0) {
    rating = "⚠️ TIGHT DEAL";
    strategy = "Proceed Carefully";
    color = "warn";
  } else {
    rating = "❌ BAD DEAL";
    strategy = "Avoid";
    color = "bad";
  }

  document.getElementById('output').innerHTML = `
    <div class="metric"><span>💰 Cash Flow:</span><span>$${cashFlow}</span></div>
    <div class="metric"><span>🏦 Equity:</span><span>$${equity}</span></div>
    <div class="metric"><span>📆 Annual Profit:</span><span>$${annual}</span></div>
    <hr>
    <div class="metric ${color}"><strong>${rating}</strong></div>
    <div class="metric"><span>📈 Strategy:</span><span>${strategy}</span></div>
  `;
}
</script>

</body>
</html>
