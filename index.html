<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Down Deal Analyzer</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  max-width: 400px;
  width: 100%;
}

h1 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  color: black;
  border: none;
  border-radius: 5px;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  padding: 10px;
  background: #334155;
  border-radius: 5px;
}

.good { color: #22c55e; }
.bad { color: #ef4444; }
.warn { color: #facc15; }
</style>
</head>

<body>

<div class="container">
<h1>🏠 Deal Analyzer</h1>

<input type="number" id="payment" placeholder="Monthly Payment">
<input type="number" id="rent" placeholder="Rent Estimate">
<input type="number" id="balance" placeholder="Mortgage Balance">
<input type="number" id="arv" placeholder="ARV">

<button onclick="analyzeDeal()">Analyze Deal</button>

<div class="result" id="output"></div>
</div>

<script>
function analyzeDeal() {
  let payment = parseFloat(document.getElementById('payment').value) || 0;
  let rent = parseFloat(document.getElementById('rent').value) || 0;
  let balance = parseFloat(document.getElementById('balance').value) || 0;
  let arv = parseFloat(document.getElementById('arv').value) || 0;

  let cashFlow = rent - payment;
  let equity = arv - balance;
  let annual = cashFlow * 12;

  let rating = "";
  let strategy = "";
  let color = "";

  if (cashFlow >= 500 && equity >= 30000) {
    rating = "🔥 GREAT DEAL";
    strategy = "Hold or Move FAST";
    color = "good";
  } else if (cashFlow >= 200 && equity >= 15000) {
    rating = "✅ GOOD DEAL";
    strategy = "Strong Option";
    color = "good";
  } else if (cashFlow >= 0) {
    rating = "⚠️ TIGHT DEAL";
    strategy = "Be Careful";
    color = "warn";
  } else {
    rating = "❌ BAD DEAL";
    strategy = "Avoid";
    color = "bad";
  }

  document.getElementById('output').innerHTML = `
    <p>💰 Cash Flow: $${cashFlow}</p>
    <p>🏦 Equity: $${equity}</p>
    <p>📆 Annual Profit: $${annual}</p>
    <p class="${color}">📊 ${rating}</p>
    <p>📈 Strategy: ${strategy}</p>
  `;
}
</script>

</body>
</html>
